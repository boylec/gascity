description = '''
SafetyChain Linear-sync safety net. Runs every 10 minutes (via
formulas/orders/linear-sync/order.toml). Finds closed convoys that:

- have metadata.linear_id set (were created by mol-sc-idea-to-plan)
- do NOT have metadata.sc.linear_transitioned_at yet

For each, calls linear-server -> save_issue state="In Review" to reconcile
Linear state with the closed convoy, then stamps metadata.sc.linear_transitioned_at
so subsequent runs skip it.

This exists because mol-convoy-cleanup.sc-linear-transition can miss
transitions when the MCP is unauthenticated, rate-limited, or when a
convoy is closed manually (bypassing the cleanup formula).

## Failure modes

| Situation | Action |
|---|---|
| linear-server MCP unauthenticated | Mail human once per run with `linear-server needs auth` prompt; continue loop |
| save_issue returns 429 / 5xx | Skip this bead, retry next run (10m later) |
| Linear issue already In Review / Done | save_issue is idempotent; stamp metadata and move on |
| Linear issue deleted | Stamp metadata with a "deleted" marker so we stop retrying |
'''
formula = "mol-sc-linear-sync"
version = 1

[[steps]]
id = "find-unreconciled"
title = "Find closed beads that reference a Linear issue (SAF-*) and have not been transitioned"
description = '''
Query beads for ANY closed bead (any type) that references a Linear issue and
hasn't yet been stamped with sc.linear_transitioned_at.

The user's convention: many beads may reference the same Linear issue (e.g.
SAF-88 is split into multiple sub-task beads). The Linear ID is found by
trying, in order:

  1. metadata.linear_id (legacy / mol-sc-idea-to-plan beads)
  2. external_ref matching "^linear-SAF-\\d+" (linear:NNN external ref)
  3. title matching "\\bSAF-\\d+\\b" (most common: user writes "SAF-401:" in title)
  4. description matching "\\bSAF-\\d+\\b"

De-dupe: first-closer-wins. When multiple closed beads match the SAME Linear
issue, only one entry is emitted (the others are noop — the Linear transition
is idempotent but we don't need to call it repeatedly).

```bash
OUT="/tmp/sc-linear-sync-$(date +%s).jsonl"

# Use gc bd --rig=enterprise to target the SafetyChain bead store.
# gc bd list without --status explicitly set returns only open-ish beads;
# we need BOTH closed and non-closed to de-dupe properly. Union them.
ALL="/tmp/sc-linear-sync-all-$(date +%s).jsonl"
(
  gc bd --rig=enterprise list --status=closed  --limit=0 --json 2>/dev/null
  gc bd --rig=enterprise list --status=open    --limit=0 --json 2>/dev/null
  gc bd --rig=enterprise list --status=in_progress --limit=0 --json 2>/dev/null
  gc bd --rig=enterprise list --status=blocked --limit=0 --json 2>/dev/null
) \
  | jq -c '.[] |
      (.metadata.linear_id // "") as $m |
      ((.external_ref // "") | capture("linear-(?<id>SAF-\\d+)").id // "") as $x |
      ((.title // "") | capture("\\b(?<id>SAF-\\d+)\\b").id // "") as $t |
      ((.description // "") | capture("\\b(?<id>SAF-\\d+)\\b").id // "") as $d |
      ([$m, $x, $t, $d] | map(select(. != "")) | (.[0] // "")) as $linear_id |
      select($linear_id != "") |
      {bead: .id,
       linear_id: $linear_id,
       status: .status,
       closed_at: (.closed_at // ""),
       stamped: ((.metadata["sc.linear_transitioned_at"] // "") != "")}' \
  > "$ALL"

# For each distinct Linear ID, skip if ANY bead (open or closed) with that
# Linear ID is already stamped. Otherwise pick the earliest-closed closed bead
# as the stamp target. If no closed bead exists for that Linear ID, skip
# (nothing to transition yet).
jq -s '
  group_by(.linear_id) |
  map(
    select(any(.[]; .stamped) | not) |
    map(select(.status == "closed")) |
    select(length > 0) |
    sort_by(.closed_at)[0]
  )
' "$ALL" | jq -c '.[]' > "$OUT"
rm -f "$ALL"

COUNT=$(wc -l < "$OUT" | awk '{print $1}')
echo "Unreconciled Linear references: $COUNT (distinct Linear IDs)"
echo "$OUT" > /tmp/sc-linear-sync-current.path
```

Exit criteria: newline-delimited JSON with {bead, linear_id, closed_at} per
distinct Linear ID at the path recorded in /tmp/sc-linear-sync-current.path.
Each Linear ID appears at most once (de-duped across many-beads-per-issue).
'''

[[steps]]
id = "reconcile"
title = "Transition each unreconciled Linear issue to In Review"
needs = ["find-unreconciled"]
description = '''
For each entry from find-unreconciled, call linear-server MCP to set
state="In Review". On success, stamp the convoy with
metadata.sc.linear_transitioned_at. On failure, leave the metadata
missing so the next run retries.

```bash
OUT=$(cat /tmp/sc-linear-sync-current.path)
[ -z "$OUT" ] || [ ! -f "$OUT" ] && { echo "no input file"; exit 0; }

FAILURES=0
SUCCESSES=0

while IFS= read -r LINE; do
  BEAD=$(printf '%s' "$LINE" | jq -r '.bead')
  LINEAR_ID=$(printf '%s' "$LINE" | jq -r '.linear_id')

  # Attempt the MCP transition. Run this via the provider's MCP call.
  # Pseudo: mcp linear-server save_issue id=$LINEAR_ID state="In Review"
  # If the attempt succeeds, stamp the transition timestamp on the
  # representative bead (the first-closer that won de-dup in find-unreconciled).
  # Other beads that reference the same Linear ID will be skipped on the next
  # run because this bead's stamp is compared via the distinct-linear-id dedup.
  if mcp_save_issue_ok "$LINEAR_ID" "In Review"; then
    gc bd --rig=enterprise update "$BEAD" \
      --set-metadata "sc.linear_transitioned_at=$(date -u +%FT%TZ)"
    SUCCESSES=$((SUCCESSES + 1))
  else
    FAILURES=$((FAILURES + 1))
  fi
done < "$OUT"

echo "reconciled=$SUCCESSES failed=$FAILURES"
rm -f "$OUT" /tmp/sc-linear-sync-current.path
```

Note: `mcp_save_issue_ok` is not a real command — the dog running this
formula invokes the linear-server MCP via its provider interface and
treats any 2xx response as success. Implementation detail belongs in the
agent's prompt template, not the formula.

Exit criteria: every unreconciled convoy either stamped with
sc.linear_transitioned_at (success) or left alone for a future run
(failure). Counts logged to stdout.
'''

[[steps]]
id = "report-if-needed"
title = "Only notify human when something interesting happened"
needs = ["reconcile"]
description = '''
The dog runs this order every 10 minutes. Most runs find zero work.
Notify the human only when:

- Successes > 0 (so the human sees Linear state catching up), OR
- Failures > 0 repeatedly (suggesting MCP auth issue or API outage).

```bash
# Dog reads the previous step's echo'd counts from its session log.
# If SUCCESSES > 0 or consecutive FAILURES >= 3, send a consolidated
# notification via sc-notify-human.sh.
#
# Otherwise exit silently.
```

Keeping this order quiet on the happy path (no work to do) prevents
notification spam — the dog runs every 10m across many convoys.

Exit criteria: the human is informed of meaningful state changes without
being spammed by empty passes.
'''
