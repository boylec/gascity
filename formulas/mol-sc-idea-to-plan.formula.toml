description = '''
SafetyChain wrapper over mol-idea-to-plan. Adds two behaviors:

1. Final human approval gate between plan-review-3 and create-beads.
   Uses scripts/sc-notify-human.sh for push notification and polls the
   coordinator's mail inbox for an async GO / request-changes / abort
   reply. Never stalls silently.

2. Conditional Linear stamping. If linear_id is passed, the convoy and
   every child bead get metadata.linear_id plus --external-ref
   linear-SAF-XX so the linear-transitions fragment's per-bead state
   transitions work during implementation, and mol-convoy-cleanup can
   transition Linear to In Review when the convoy closes.

## Pre-slinging contract (mayor's responsibility, not the formula's)

Before the mayor slings this formula, if the work came from a Linear issue:

- Call linear-server -> get_issue to pull title + description + linked PRD
- Synthesize problem + context text from those fields
- Call linear-server -> save_issue state="In Progress" to mark it claimed
- Sling with --var linear_id=SAF-XX --var problem="..." --var context="..."

If the work is free-text (no Linear issue):

- Sling with --var problem="..." --var context="..." (omit linear_id)

See template-fragments/sc-policy.md.tmpl for the entry-mode detection rule.

## Pipeline

Same 11 steps as mol-idea-to-plan, PLUS:

- sc-plan-approval inserted after plan-review-3
- create-beads overridden to skip integration/<id> target and stamp
  Linear refs on convoy + child beads when linear_id is set.
'''
formula = "mol-sc-idea-to-plan"
extends = ["mol-idea-to-plan"]
version = 1

[vars]
[vars.linear_id]
description = "Linear issue ID (e.g., SAF-123). Omit for free-text planning runs."
default = ""

[[steps]]
id = "sc-plan-approval"
title = "Notify Casey, wait for mail-based approval reply"
needs = ["plan-review-3"]
description = '''
Final human gate. Presents the reviewed plan, fires multi-channel
notification, and waits for an async reply via mail. Does not block the
live conversation or assume Casey is attached to the coordinator session.

**1. Assemble the approval packet.**

```bash
COORD="$GC_AGENT"       # coordinator's own session alias
DESIGN=".designs/$REVIEW_ID/design-doc.md"
REVIEW=".plan-reviews/$REVIEW_ID/plan-review.md"
TAG="{{linear_id}}"
[ -z "$TAG" ] && TAG="(free-text run)"
SUBJECT="PLAN READY FOR APPROVAL: $TAG"
BODY=$(cat <<EOF
Plan ready.
  Design doc:   $DESIGN
  Review synth: $REVIEW

Reply asynchronously by mailing the coordinator ($COORD):

  gc mail send $COORD -s "plan-approval" -m "y"
  gc mail send $COORD -s "plan-approval" -m "request-changes: <notes>"
  gc mail send $COORD -s "plan-approval" -m "abort"

Or attach to the coordinator tmux and type in the live conversation.
EOF
)
```

**2. Fan out the notification (best-effort, non-blocking).**

```bash
"$GC_CITY_DIR/scripts/sc-notify-human.sh" "$SUBJECT" "$BODY"
```

**3. Also post the same summary into the live conversation** so an
attached Casey sees it immediately.

**4. Wait for an approval reply via mail** (poll every 60s, hard timeout 24h).

```bash
DEADLINE=$(( $(date +%s) + 86400 ))
REPLY=""
while [ "$(date +%s)" -lt "$DEADLINE" ]; do
  REPLY=$(gc mail inbox --json 2>/dev/null | jq -r \
    --arg c "$COORD" \
    '.[] | select(.to==$c and .subject=="plan-approval" and .status=="unread") | "\(.id)\t\(.body)"' \
    | head -n1)
  [ -n "$REPLY" ] && break
  sleep 60
done
```

If the 24h deadline hits with no reply, re-notify once via
sc-notify-human.sh and keep polling. Do not auto-approve.

**5. Act on the reply.**

```bash
ID=$(printf '%s' "$REPLY" | cut -f1)
ANSWER=$(printf '%s' "$REPLY" | cut -f2- | tr '[:upper:]' '[:lower:]')
gc mail mark-read "$ID"
```

- `y` (or `yes`) -> proceed to create-beads.
- Starts with `request-changes` -> extract notes after the colon, append
  to `.plan-reviews/$REVIEW_ID/change-requests.md`, re-run plan-review-3
  steps with updated inputs, then re-enter this step. Max 2
  request-changes iterations before re-notifying Casey and staying blocked
  until an explicit y or abort.
- `abort` -> close the run cleanly. If linear_id is set, leave the Linear
  issue in "In Progress" (Casey manages manually); do not silently
  transition back to Backlog.
- Anything else -> mail Casey back asking for a valid answer, re-enter
  the wait loop.
'''

# Override parent's create-beads: conditional Linear stamping, omit
# integration/<convoy-id> target so GC_TARGET_BRANCH env wins.
[[steps]]
id = "create-beads"
title = "Create convoy and beads, stamp Linear refs conditionally"
needs = ["sc-plan-approval"]
description = '''
Turn the approved plan into executable work.

**1. Read the final plan.**

```bash
cat ".designs/$REVIEW_ID/design-doc.md"
```

**2. Create an owned convoy for the initiative.**

```bash
CONVOY=$(gc convoy create "<initiative-name>" --owned --json | jq -r .id)
```

Do NOT call `gc convoy target $CONVOY integration/$CONVOY`. SafetyChain
polecats push directly to `$GC_TARGET_BRANCH` (boylec/develop), so the
integration-branch pattern does not apply. The rig env override wins
regardless, but setting it would confuse the convoy view.

Record references to:
- `.prd-reviews/$REVIEW_ID/prd-draft.md`
- `.prd-reviews/$REVIEW_ID/prd-review.md`
- `.designs/$REVIEW_ID/design-doc.md`
- `.plan-reviews/$REVIEW_ID/`

**3. Stamp Linear linkage on the convoy (if applicable).**

```bash
if [ -n "{{linear_id}}" ]; then
  bd update "$CONVOY" \
    --set-metadata linear_id={{linear_id}} \
    --external-ref linear-{{linear_id}}
  bd label add "$CONVOY" "linear:{{linear_id}}"
fi
```

**4. Create task beads for each implementation slice.**

Each task bead should include:
- what changes
- affected files or subsystems
- acceptance criteria
- notes copied from the design doc

Prefer thin vertical slices over giant phases.

```bash
TASK_ID=$(bd create --title "<slice title>" --description "<slice desc>" \
                    --type task --priority 2 --json | jq -r .id)
if [ -n "{{linear_id}}" ]; then
  bd update "$TASK_ID" \
    --set-metadata linear_id={{linear_id}} \
    --external-ref linear-{{linear_id}}
fi
gc convoy add "$CONVOY" "$TASK_ID"
```

**5. Wire dependencies with `bd dep add`.**

Model actual "X needs Y" relationships. Verify with `bd blocked`.

**6. Record the created bead IDs in:**
`.plan-reviews/$REVIEW_ID/beads-created.md`

**7. Notify the human with the dispatch hint.**

```bash
LINK_NOTE=""
if [ -n "{{linear_id}}" ]; then
  LINK_NOTE="Linear: {{linear_id}} (metadata stamped on convoy + beads)."
fi
SUBJECT="CONVOY READY: $CONVOY"
BODY=$(cat <<EOF
Plan approved. Convoy $CONVOY created with N task beads.
$LINK_NOTE

Dispatch:
  gc sling hq/mayor mol-sc-sling-convoy --formula --var convoy_id=$CONVOY

Artifacts live in .designs/$REVIEW_ID/ and .plan-reviews/$REVIEW_ID/.
EOF
)
"$GC_CITY_DIR/scripts/sc-notify-human.sh" "$SUBJECT" "$BODY"
```

**Final output** of this workflow is a reviewed plan plus a beads DAG, not
code. Implementation happens separately via `mol-sc-sling-convoy`.
'''
