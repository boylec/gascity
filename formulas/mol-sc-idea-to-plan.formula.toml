description = '''
SafetyChain wrapper over mol-idea-to-plan. Adds two behaviors:

1. Final human approval gate between plan-review-3 and create-beads.
   Uses assets/scripts/sc-notify-human.sh for push notification and polls the
   coordinator's mail inbox for an async GO / request-changes / abort
   reply. Never stalls silently.

2. Conditional Linear stamping. If linear_id is passed, the convoy and
   every child bead get metadata.linear_id plus --external-ref
   linear-SAF-XX so the linear-transitions fragment's per-bead state
   transitions work during implementation, and mol-convoy-cleanup can
   transition Linear to In Review when the convoy closes.

## Pre-slinging contract (mayor's responsibility, not the formula's)

This formula runs inside a **Quartermaster** session on opus-max-1m — NOT
in the mayor's session. The mayor delegates to `hq/quartermaster` so that
multiple plans can run in parallel without blocking mayor coordination.

Before the mayor slings this formula, if the work came from a Linear issue:

- Call linear-server -> get_issue to pull title + description + linked PRD
- Synthesize problem + context text from those fields
- Call linear-server -> save_issue state="In Progress" to mark it claimed
- Sling to the Quartermaster pool:
  `gc sling hq/quartermaster mol-sc-idea-to-plan --formula \
    --var linear_id=SAF-XX --var problem="..." --var context="..."`

If the work is free-text (no Linear issue):

- Sling to the Quartermaster pool:
  `gc sling hq/quartermaster mol-sc-idea-to-plan --formula \
    --var problem="..." --var context="..."` (omit linear_id)

Mayor returns the new Quartermaster session id to the human (so the human knows
where to send approval mail) and then stops — does NOT wait for the plan
to finish.

See template-fragments/sc-policy.md.tmpl for the entry-mode detection rule
and the Quartermaster delegation protocol.

## Pipeline

Same 11 steps as mol-idea-to-plan, PLUS:

- sc-plan-approval inserted after plan-review-3
- create-beads overridden to skip integration/<id> target and stamp
  Linear refs on convoy + child beads when linear_id is set.
'''
formula = "mol-sc-idea-to-plan"
extends = ["mol-idea-to-plan"]
version = 1

[vars]
[vars.linear_id]
description = "Linear issue ID (e.g., SAF-123). Omit for free-text planning runs."
default = ""

[vars.require_human_approval]
description = "If 'true', pause at sc-plan-approval and wait for mail-based approval. If 'false', skip the gate and proceed directly to create-beads. Default: 'true'."
default = "true"

[[steps]]
id = "sc-plan-approval"
title = "Notify the human, wait for mail-based approval reply (skippable via require_human_approval=false)"
needs = ["plan-review-3"]
description = '''
Final human gate. Presents the reviewed plan, fires multi-channel
notification, and waits for an async reply via mail. Does not block the
live conversation or assume the human is attached to the coordinator session.

**0. Approval-required short-circuit.**

If `require_human_approval` is `"false"`, skip notification + wait entirely
and proceed to create-beads. This is the autonomous-run path — used when
the mayor re-pours a previously-blocked Linear issue without needing a
human in the loop. Any value other than `"false"` (including default
`"true"` and empty string) preserves the human-gate behavior.

```bash
if [ "{{require_human_approval}}" = "false" ]; then
  echo "sc-plan-approval: require_human_approval=false — skipping human gate, proceeding to create-beads"
  exit 0
fi
```

**1. Assemble the approval packet.**

```bash
COORD="$GC_AGENT"       # coordinator's own session alias
DESIGN=".designs/$REVIEW_ID/design-doc.md"
REVIEW=".plan-reviews/$REVIEW_ID/plan-review.md"
TAG="{{linear_id}}"
[ -z "$TAG" ] && TAG="(free-text run)"
SUBJECT="PLAN READY FOR APPROVAL: $TAG"
BODY=$(cat <<EOF
Plan ready.
  Design doc:   $DESIGN
  Review synth: $REVIEW

Reply asynchronously by mailing the coordinator ($COORD):

  gc mail send $COORD -s "plan-approval" -m "y"
  gc mail send $COORD -s "plan-approval" -m "request-changes: <notes>"
  gc mail send $COORD -s "plan-approval" -m "abort"

Or attach to the coordinator tmux and type in the live conversation.
EOF
)
```

**2. Fan out the notification (best-effort, non-blocking).**

```bash
"$GC_CITY_DIR/assets/scripts/sc-notify-human.sh" "$SUBJECT" "$BODY"
```

**3. Also post the same summary into the live conversation** so an
attached the human sees it immediately.

**4. Wait for an approval reply via mail** (poll every 60s, hard timeout 24h).

```bash
DEADLINE=$(( $(date +%s) + 86400 ))
REPLY=""
while [ "$(date +%s)" -lt "$DEADLINE" ]; do
  REPLY=$(gc mail inbox --json 2>/dev/null | jq -r \
    --arg c "$COORD" \
    '.[] | select(.to==$c and .subject=="plan-approval" and .status=="unread") | "\(.id)\t\(.body)"' \
    | head -n1)
  [ -n "$REPLY" ] && break
  sleep 60
done
```

If the 24h deadline hits with no reply, re-notify once via
sc-notify-human.sh and keep polling. Do not auto-approve.

**5. Act on the reply.**

```bash
ID=$(printf '%s' "$REPLY" | cut -f1)
ANSWER=$(printf '%s' "$REPLY" | cut -f2- | tr '[:upper:]' '[:lower:]')
gc mail mark-read "$ID"
```

- `y` (or `yes`) -> proceed to create-beads.
- Starts with `request-changes` -> extract notes after the colon, append
  to `.plan-reviews/$REVIEW_ID/change-requests.md`, re-run plan-review-3
  steps with updated inputs, then re-enter this step. Max 2
  request-changes iterations before re-notifying the human and staying blocked
  until an explicit y or abort.
- `abort` -> close the run cleanly. If linear_id is set, leave the Linear
  issue in "In Progress" (the human manages manually); do not silently
  transition back to Backlog.
- Anything else -> mail the human back asking for a valid answer, re-enter
  the wait loop.
'''

# Override parent's create-beads: conditional Linear stamping, omit
# integration/<convoy-id> target so GC_TARGET_BRANCH env wins.
[[steps]]
id = "create-beads"
title = "Create convoy and beads, stamp Linear refs conditionally"
needs = ["sc-plan-approval"]
description = '''
Turn the approved plan into executable work.

**1. Read the final plan.**

```bash
cat ".designs/$REVIEW_ID/design-doc.md"
```

**2. Create an owned convoy for the initiative.**

```bash
CONVOY=$(gc convoy create "<initiative-name>" --owned --json | jq -r .id)
```

Do NOT call `gc convoy target $CONVOY integration/$CONVOY`. SafetyChain
polecats push directly to `$GC_TARGET_BRANCH` (boylec/develop), so the
integration-branch pattern does not apply. The rig env override wins
regardless, but setting it would confuse the convoy view.

Record references to:
- `.prd-reviews/$REVIEW_ID/prd-draft.md`
- `.prd-reviews/$REVIEW_ID/prd-review.md`
- `.designs/$REVIEW_ID/design-doc.md`
- `.plan-reviews/$REVIEW_ID/`

**3. Stamp Linear linkage on the convoy (if applicable).**

```bash
if [ -n "{{linear_id}}" ]; then
  bd update "$CONVOY" \
    --set-metadata linear_id={{linear_id}} \
    --external-ref linear-{{linear_id}}
  bd label add "$CONVOY" "linear:{{linear_id}}"
fi
```

**4. Create task beads for each implementation slice.**

Each task bead should include:
- what changes
- affected files or subsystems
- acceptance criteria
- notes copied from the design doc

Prefer thin vertical slices over giant phases.

For each slice, also decide the polecat tier that will implement it. You
have the full design doc in context right now — this is the moment to
make that call deliberately. The downstream `mol-sc-sling-convoy` formula
will honor `metadata.agent_tier` and only fall back to regex heuristics
when it is unset.

Tier rubric (see template-fragments/sc-policy.md.tmpl for the canonical
version):

- `sonnet` — default. Bounded area, straightforward implementation, clear
  acceptance criteria.
- `opus-high` — design judgment required, cross-cutting, non-trivial
  tests, security-sensitive, or the design doc flagged the slice as
  complex.
- `opus-max-1m` — needs the full design doc + surrounding code in
  context: large refactors, novel subsystems, data-model migrations.

Default to `sonnet`. Only escalate when you can name the specific
complexity signal from the design doc that forces it.

```bash
TASK_ID=$(bd create --title "<slice title>" --description "<slice desc>" \
                    --type task --priority 2 --json | jq -r .id)
if [ -n "{{linear_id}}" ]; then
  bd update "$TASK_ID" \
    --set-metadata linear_id={{linear_id}} \
    --external-ref linear-{{linear_id}}
fi

# Stamp the tier decision. TIER is one of: sonnet | opus-high | opus-max-1m.
TIER="sonnet"   # change per the rubric above for this specific slice
bd update "$TASK_ID" --set-metadata agent_tier="$TIER"
bd label add "$TASK_ID" "tier:$TIER"

gc convoy add "$CONVOY" "$TASK_ID"
```

**5. Wire dependencies with `bd dep add`.**

Model actual "X needs Y" relationships. Verify with `bd blocked`.

**6. Record the created bead IDs in:**
`.plan-reviews/$REVIEW_ID/beads-created.md`

**7. Auto-dispatch the convoy, then notify the human.**

The convoy has already cleared `sc-plan-approval` (or the autonomous path
was explicitly opted into). There is no additional gate between "plan
approved" and "polecats start working" — so the quartermaster hands the
dispatch molecule to the mayor pool directly rather than leaving a
post-it note for a human to notice.

This removes the class of bug where task beads sit unrouted because the
follow-up `gc sling ... mol-sc-sling-convoy` step was forgotten or the
human was AFK. The mayor still owns dispatch; the quartermaster just
hands off mechanically instead of via side-channel notification.

```bash
# Hand dispatch off to the mayor pool. This creates a mayor-owned
# molecule bead running mol-sc-sling-convoy, which walks the convoy's
# children and slings each to the tier-appropriate polecat variant per
# metadata.agent_tier stamped above.
DISPATCH_RESULT=$(gc sling hq/mayor mol-sc-sling-convoy --formula \
  --var convoy_id="$CONVOY" 2>&1)
echo "dispatch-convoy: $DISPATCH_RESULT"

LINK_NOTE=""
if [ -n "{{linear_id}}" ]; then
  LINK_NOTE="Linear: {{linear_id}} (metadata stamped on convoy + beads)."
fi
SUBJECT="CONVOY DISPATCHED: $CONVOY"
BODY=$(cat <<EOF
Plan approved. Convoy $CONVOY created with N task beads and dispatched
to the mayor pool (mol-sc-sling-convoy). Polecats will start claiming
beads per their agent_tier as pool slots free up.
$LINK_NOTE

Dispatch command (already run):
  gc sling hq/mayor mol-sc-sling-convoy --formula --var convoy_id=$CONVOY

Artifacts live in .designs/$REVIEW_ID/ and .plan-reviews/$REVIEW_ID/.
EOF
)
"$GC_CITY_DIR/assets/scripts/sc-notify-human.sh" "$SUBJECT" "$BODY"
```

**Final output** of this workflow is a reviewed plan, a beads DAG, AND a
dispatched convoy. Implementation happens in polecats via
`mol-sc-sling-convoy`, which the mayor pool now receives automatically.
'''

# Override parent's init-run: fail fast if REVIEW_TARGET can't be resolved.
# The parent formula echoes a warning and continues — which leaves
# REVIEW_TARGET empty, which later causes leg beads to land unrouted (real
# incident on 2026-04-21: 3 PRD review legs stranded with no gc.routed_to
# because the coordinator ran from HQ without --var review_target).
[[steps]]
id = "init-run"
title = "Initialize the planning run in the current repo"
description = '''
Anchor the run in the current repository and set up durable artifact paths.

**1. Prime and move to the repo root:**
```bash
gc prime
gc bd prime
REPO_ROOT=$(git rev-parse --show-toplevel)
cd "$REPO_ROOT"
```

**2. Resolve the review target (fail fast if unresolvable):**
```bash
REVIEW_TARGET="{{review_target}}"
if [ -z "$REVIEW_TARGET" ]; then
  if [ -n "$GC_RIG" ]; then
    REVIEW_TARGET="$GC_RIG/polecat"
  else
    echo "FATAL: REVIEW_TARGET unresolved. Pass --var review_target=<rig>/gastown.polecat when slinging from HQ (e.g. --var review_target=enterprise/gastown.polecat). The parent formula would continue silently — SafetyChain wrapper refuses, because unrouted leg beads strand the workflow." >&2
  exit 1
  fi
fi
COORDINATOR="$GC_AGENT"
```

**3. Pick a stable slug and create artifact directories:**
Choose a short, descriptive `REVIEW_ID` such as `merge-queue-v2`,
`notification-levels`, or `session-bead-audit`.

```bash
mkdir -p ".prd-reviews/$REVIEW_ID" ".designs/$REVIEW_ID" ".plan-reviews/$REVIEW_ID"
cat > ".plan-reviews/$REVIEW_ID/state.env" <<EOF
REVIEW_ID=$REVIEW_ID
REVIEW_TARGET=$REVIEW_TARGET
COORDINATOR=$COORDINATOR
REPO_ROOT=$REPO_ROOT
EOF
```

If you restart or compact, reuse the same `REVIEW_ID` and continue from the
existing artifact files instead of starting over.
'''

# Override parent's prd-review: stamp gc.routed_to on every leg bead at
# bd-update time, BEFORE the sling call. If sling fails for any reason
# (controller hiccup, target unreachable, etc.), the bead is still
# mechanically routed and any polecat on the pool picks it up. Also add
# an explicit guard before the sling — redundant with init-run's check
# but cheap, and makes failure modes clear at the dispatch site.
[[steps]]
id = "prd-review"
title = "Dispatch 6 PRD review legs in parallel and synthesize the result"
needs = ["draft-prd"]
description = '''
Fan out parallel PRD review using review task beads plus `mol-review-leg`.

**Dispatch pattern for EVERY review leg in this workflow:**
1. Create the assignment bead and CAPTURE its ID from command output:
```bash
LEG_BEAD=$(gc bd create --title "<leg title>" --description "<prompt>" \
  --type task --priority 2 --json | jq -r .id)
echo "Created bead: $LEG_BEAD"
```
2. VERIFY the bead exists (guards against fabricated IDs):
```bash
bd show "$LEG_BEAD"
```
3. Set metadata on the verified bead. **Stamp `gc.routed_to` here** — do
   NOT rely on the sling step to do it. If the sling later fails, the bead
   still lands in the pool and a polecat picks it up:
```bash
bd update "$LEG_BEAD" \
  --set-metadata coordinator="$COORDINATOR" \
  --set-metadata review_id="$REVIEW_ID" \
  --set-metadata review_phase=<phase> \
  --set-metadata review_leg=<leg> \
  --set-metadata gc.routed_to="$REVIEW_TARGET"
```
4. Sling using the validated wrapper (REVIEW_TARGET must be non-empty):
```bash
if [ -z "$REVIEW_TARGET" ]; then
  echo "FATAL: cannot sling leg $LEG_BEAD — REVIEW_TARGET is empty. init-run should have caught this." >&2
  exit 1
fi
"$GC_CITY_DIR/assets/scripts/verified-sling.sh" "$REVIEW_TARGET" "$LEG_BEAD" --on {{review_formula}}
```
5. Record the bead ID in the round log
6. Wait for completion mail or poll the bead until it closes
7. Read the full report from the bead notes with `gc bd show "$LEG_BEAD"`

⚠️ **NEVER fabricate bead IDs.** The ID MUST come from `gc bd create --json`
output. If the create command fails or returns empty, STOP and escalate.

**Standard instructions each review bead must include:**
- read `.prd-reviews/$REVIEW_ID/prd-draft.md`
- produce the full report in bead notes
- mail `$COORDINATOR` when complete
- do not push code or touch unrelated work

**Create 6 legs with these focuses:**
- `requirements`, `gaps`, `ambiguity`, `feasibility`, `scope`, `stakeholders`

Record the review bead IDs in `.plan-reviews/$REVIEW_ID/prd-review-beads.tsv`.

After all 6 are complete, synthesize `.prd-reviews/$REVIEW_ID/prd-review.md`
with: Executive Summary / Before You Build: Critical Questions / Important
But Non-Blocking / Observations and Suggestions / Confidence Assessment /
Next Steps. Use those questions to drive the human gate in the next step.
'''
