[pack]
name = "SafetyChain"
schema = 2
version = "0.1.0"

[imports.gastown]
# Materialized into .gc/ by `gc init` from the gascity binary's embedded copy.
# Version-locked to the installed gc; upgrade via `brew upgrade gastownhall/gascity/gascity`.
source = "./.gc/system/packs/gastown"

[agent_defaults]
append_fragments = [
    "command-glossary",
    "operational-awareness",
    "linear-transitions",
    "target-branch-override",
    "sc-policy",
]

[providers.claude]
base = "claude"
ready_delay_ms = 0

[providers.claude.option_defaults]
permission_mode = "unrestricted"

[providers.claude-opus-high]
base = "claude"
ready_delay_ms = 0

[providers.claude-opus-high.option_defaults]
effort = "high"
model = "opus"
permission_mode = "unrestricted"

[providers.claude-opus-max]
base = "claude"
ready_delay_ms = 0

[providers.claude-opus-max.option_defaults]
effort = "max"
model = "opus"
permission_mode = "unrestricted"

[providers.claude-sonnet]
base = "claude"
ready_delay_ms = 0

[providers.claude-sonnet.option_defaults]
effort = "medium"
model = "sonnet"
permission_mode = "unrestricted"
