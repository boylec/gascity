[workspace]
name = "SafetyChain"
prefix = "hq"
provider = "claude"
global_fragments = ["command-glossary", "operational-awareness"]
includes = [".gc/system/packs/gastown"]
default_rig_includes = [".gc/system/packs/gastown"]

[[rigs]]
name = "enterprise"
path = "/Users/caseyboyle/src/SafetyChain/enterprise"
git_url = "https://github.com/safety-chain/enterprise"
# Resolved at runtime: $(gh api user -q .login)/develop
default_branch = "${GH_USER}/develop"
prefix = "sc"
includes = [".gc/system/packs/gastown"]

[[rigs]]
name = "designsystem"
path = "/Users/caseyboyle/src/SafetyChain/design-system"
git_url = "https://github.com/safety-chain/design-system"
# Resolved at runtime: $(gh api user -q .login)/develop
default_branch = "${GH_USER}/develop"
prefix = "de"
includes = [".gc/system/packs/gastown"]

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
