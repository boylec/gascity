[workspace]
name = "SafetyChain"
prefix = "hq"
provider = "claude"

[[rigs]]
name = "enterprise"
path = "../enterprise"
prefix = "sc"
[rigs.imports]
[rigs.imports.gastown]
source = "./.gc/system/packs/gastown"
[rigs.imports.safetychain]
source = "./assets/safetychain"

[[rigs.overrides]]
agent = "polecat"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-sonnet"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-high"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-max-1m"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "refinery"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs]]
name = "designsystem"
path = "../design-system"
prefix = "de"
suspended = true
[rigs.imports]
[rigs.imports.gastown]
source = "./.gc/system/packs/gastown"
[rigs.imports.safetychain]
source = "./assets/safetychain"

[session]
startup_timeout = "180s"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
