[workspace]
name = "SafetyChain"
prefix = "hq"
provider = "claude"
global_fragments = ["command-glossary", "operational-awareness", "linear-transitions"]
includes = [".gc/system/packs/gastown"]
default_rig_includes = [".gc/system/packs/gastown"]

[providers.claude]
option_defaults = { permission_mode = "unrestricted" }

[[rigs]]
name = "enterprise"
path = "../enterprise"
prefix = "sc"
includes = [".gc/system/packs/gastown"]

[[rigs]]
name = "designsystem"
path = "../design-system"
prefix = "de"
suspended = true
includes = [".gc/system/packs/gastown"]

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"

[session]
startup_timeout = "180s"
