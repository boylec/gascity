[workspace]
name = "SafetyChain"
prefix = "hq"
provider = "claude"
global_fragments = ["command-glossary", "operational-awareness", "linear-transitions", "target-branch-override", "sc-policy"]

[providers]
[providers.claude]
ready_delay_ms = 0
[providers.claude.option_defaults]
permission_mode = "unrestricted"
[providers.claude-opus-high]
ready_delay_ms = 0
[providers.claude-opus-high.option_defaults]
effort = "high"
model = "opus"
permission_mode = "unrestricted"
[providers.claude-opus-max-1m]
ready_delay_ms = 0
[providers.claude-opus-max-1m.option_defaults]
effort = "max"
model = "opus[1m]"
permission_mode = "unrestricted"
[providers.claude-sonnet]
ready_delay_ms = 0
[providers.claude-sonnet.option_defaults]
effort = "medium"
model = "sonnet"
permission_mode = "unrestricted"

[[rigs]]
name = "enterprise"
path = "../enterprise"
prefix = "sc"
includes = [".gc/system/packs/gastown", "packs/safetychain"]

[[rigs.overrides]]
agent = "polecat"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-sonnet"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-high"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-max-1m"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "refinery"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs]]
name = "designsystem"
path = "../design-system"
prefix = "de"
suspended = true
includes = [".gc/system/packs/gastown", "packs/safetychain"]

[session]
startup_timeout = "180s"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
