agent = []

[workspace]
name = ""
provider = "claude"

[[rigs]]
name = "enterprise"
prefix = "sc"

[[rigs.overrides]]
agent = "polecat"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-sonnet"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-high"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "polecat-opus-max-1m"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs.overrides]]
agent = "refinery"
[rigs.overrides.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs]]
name = "gascity"
prefix = "gc"

[[rigs]]
name = "designsystem"
prefix = "de"
suspended = true

[session]
startup_timeout = "180s"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
