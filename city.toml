[workspace]
provider = "claude"
global_fragments = ["command-glossary", "operational-awareness"]
[workspace.env]
GC_TARGET_BRANCH = "boylec/develop"

[[rigs]]
name = "enterprise"
prefix = "sc"
default_sling_target = "enterprise/polecat"
dolt_host = "127.0.0.1"
dolt_port = "58414"
[rigs.imports]
[rigs.imports.gastown]
source = "./.gc/system/packs/gastown"
[rigs.imports.polecats]
source = "./packs/polecats"

[[rigs]]
name = "gascity"
prefix = "gc"
default_sling_target = "gascity/polecat"
[rigs.imports]
[rigs.imports.gastown]
source = "./.gc/system/packs/gastown"
[rigs.imports.polecats]
source = "./packs/polecats"

[[rigs]]
name = "designsystem"
prefix = "de"
suspended = true
default_sling_target = "designsystem/polecat"
dolt_host = "127.0.0.1"
dolt_port = "53930"
[rigs.imports]
[rigs.imports.gastown]
source = "./.gc/system/packs/gastown"
[rigs.imports.polecats]
source = "./packs/polecats"

[session]
startup_timeout = "180s"

[daemon]
formula_v2 = true
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
